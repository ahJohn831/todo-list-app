name: Build Pipeline

on:
  push:
    branches:
      - main  # Trigger the pipeline when there is a push to the 'main' branch
  pull_request:
    branches:
      - main  # Trigger the pipeline for pull requests targeting 'main'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up JDK 11
      uses: actions/setup-java@v2
      with:
        java-version: '11'

    - name: Build with Maven
      run: mvn clean install -DskipTests # Optional: add more arguments here based on your needs
